version: '3.8'

services:
  db:
    image: mariadb:10.11
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-root}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-badirra_crm}
      - MYSQL_USER=${MYSQL_USER:-badirra}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-badirra}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - badirra_net

  app:
    build: .
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=${MYSQL_DATABASE:-badirra_crm}
      - DB_USER=${MYSQL_USER:-badirra}
      - DB_PASSWORD=${MYSQL_PASSWORD:-badirra}
    command: /bin/sh -c "chown -R www-data:www-data /var/www/html && chmod -R 755 /var/www/html && apache2-foreground"
    depends_on:
      - db
    networks:
      - badirra_net

volumes:
  db_data:

networks:
  badirra_net:
